<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Prominex Global | Supply Chain Reimagined</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        html, body { 
            margin: 0; padding: 0; height: 100svh; width: 100%; overflow: hidden; 
            background-color: #000; font-family: 'Inter', sans-serif; 
            /* FORCED VISIBILITY */
            opacity: 1 !important; 
            color: white;
        }

        .logo-fixed-center {
            position: absolute; top: 0; left: 50%;
            transform: translateX(-50%); z-index: 9999;
            padding-top: 30px; display: flex; flex-direction: column; align-items: center; text-decoration: none;
        }

        .sovereign-svg { width: 80px; height: auto; filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.4)); }
        .logo-text-group { text-align: center; margin-top: 8px; }
        .logo-main { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; color: white; }
        .logo-sub { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #60a5fa; letter-spacing: 0.5em; }

        .mirror-gloss {
            color: #ffffff;
            background: linear-gradient(110deg, #fff 20%, #60a5fa 50%, #fff 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        #main-header { position: relative; height: 100svh; width: 100%; background: #000; }
        .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-cover; opacity: 0.5; z-index: 0; }
        
        .content-layer { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .btn-industrial {
            padding: 20px 40px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em;
            border: 1px solid white; color: white; text-decoration: none; transition: 0.3s;
        }
        .btn-blue { background: #2563eb; border-color: #2563eb; }
        .btn-blue:hover { background: white; color: #2563eb; }

        #menu-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
        }
        #menu-overlay.open { display: flex; }
    </style>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <a href="#" class="logo-fixed-center">
        <svg class="sovereign-svg" viewBox="0 0 100 60" fill="none">
            <path d="M10 10C30 15 45 25 50 30C45 35 30 45 10 50C25 45 35 35 35 30C35 25 25 15 10 10Z" fill="white"/>
            <path d="M90 10C70 15 55 25 50 30C55 35 70 45 90 50C75 45 65 35 65 30C65 25 75 15 90 10Z" fill="white"/>
            <rect x="47" y="27" width="6" height="6" transform="rotate(45 50 30)" fill="#06b6d4"/>
        </svg>
        <div class="logo-text-group">
            <div class="logo-main">Prominex</div>
            <div class="logo-sub">Global</div>
        </div>
    </a>

    <header id="main-header">
        <img src="assets/ship.webp" class="bg-img" onerror="this.style.display='none'">
        
        <div class="content-layer">
            <h1 class="mirror-gloss" style="font-size: 4rem; text-align: center; font-weight: 900; text-transform: uppercase;">
                Supply Chain<br>Reimagined
            </h1>
            
            <div style="margin-top: 50px; display: flex; gap: 20px;">
                <a href="#" class="btn-industrial btn-blue">Partner With Us</a>
                <button onclick="toggleMenu()" class="btn-industrial">Explore</button>
            </div>
        </div>
    </header>

    <div id="menu-overlay">
        <h2 style="letter-spacing: 0.5em; color: #60a5fa; margin-bottom: 40px;">NETWORK HUB</h2>
        <div style="display: flex; flex-direction: column; gap: 20px; text-align: center;">
            <a href="#" style="color: white; text-decoration: none; font-size: 1.5rem; font-weight: 900;">SOURCING</a>
            <a href="#" style="color: white; text-decoration: none; font-size: 1.5rem; font-weight: 900;">LOGISTICS</a>
            <a href="#" style="color: white; text-decoration: none; font-size: 1.5rem; font-weight: 900;">MANUFACTURING</a>
        </div>
        <button onclick="toggleMenu()" style="margin-top: 60px; color: #60a5fa; background: none; border: 1px solid #60a5fa; padding: 10px 30px; cursor: pointer;">CLOSE</button>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('menu-overlay').classList.toggle('open');
        }
    </script>
</body>
</html>
