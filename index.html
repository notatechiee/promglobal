<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    
    <title>Prominex Global | Home</title>
    <meta name="description" content="Strategic global supply chain solutions and industrial consultancy.">
    <link rel="icon" type="image/png" href="assets/favprom.PNG">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        html, body { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; }

        /* --- RESPONSIVE LOGO --- */
        .logo-fixed-center {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 9999;
        }
        .logo-fixed-center img { height: 40px; width: auto; transition: height 0.3s; }
        @media (min-width: 768px) { .logo-fixed-center { top: 40px; } .logo-fixed-center img { height: 60px; } }

        /* --- TEXT ROTATOR RESPONSIVENESS --- */
        .rotator-container { position: relative; min-height: 40vh; width: 100%; display: flex; align-items: center; justify-content: center; }
        .rotator-text { 
            position: absolute; opacity: 0; transition: opacity 1.5s ease; 
            width: 90%; text-align: center; left: 5%;
        }
        .rotator-text.active { opacity: 1; z-index: 2; }
        .mirror-gloss {
            display: inline-block; color: #ffffff;
            background: linear-gradient(110deg, rgba(255,255,255,0.2) 20%, rgba(255,255,255,1) 50%, rgba(255,255,255,0.2) 80%);
            background-size: 250% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: classySweep 10s linear infinite;
        }
        @keyframes classySweep { 0% { background-position: 250% 0%; } 100% { background-position: -250% 0%; } }

        /* --- THE HUB OVERLAY (MOBILE OPTIMIZED) --- */
        #menu-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #0a1425 0%, #000 100%);
            backdrop-filter: blur(25px); z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
            padding: 20px;
        }
        #menu-overlay.open { opacity: 1; pointer-events: auto; }

        /* Hide the complex SVG on small phones to prevent 'sandwiched' look */
        .canvas-area { position: relative; width: 100%; max-width: 800px; height: 300px; display: none; }
        @media (min-width: 1024px) { .canvas-area { display: block; } }

        /* Mobile-only vertical list for the Hub */
        .mobile-node-list { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        @media (min-width: 1024px) { .mobile-node-list { display: none; } }

        .m-node {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 8px; color: #fff; text-transform: uppercase;
            font-size: 10px; letter-spacing: 0.2em; display: flex; align-items: center; gap: 15px;
            text-decoration: none; font-weight: 800;
        }
        .m-node i { color: #3b82f6; font-size: 16px; }

        /* SVG Components */
        .inf-svg { width: 100%; height: 100%; overflow: visible; }
        .path-base { fill: none; stroke: rgba(255, 255, 255, 0.12); stroke-width: 2.5; }
        .signal { fill: none; stroke: #3b82f6; stroke-width: 4; stroke-dasharray: 140, 1500; animation: flowLoop 6s linear infinite; filter: drop-shadow(0 0 12px #2563eb); }
        @keyframes flowLoop { from { stroke-dashoffset: 1640; } to { stroke-dashoffset: 0; } }

        .node { position: absolute; display: flex; flex-direction: column; align-items: center; text-decoration: none; transform: translate(-50%, -50%); }
        .node-icon { width: 60px; height: 60px; background: #000; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; }
        .node-label { position: absolute; top: 70px; width: 150px; color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 800; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; }

        .p-about { top: 50%; left: 50%; }
        .p-sourcing { top: 25%; left: 22%; }
        .p-logistics { top: 25%; left: 78%; }
        .p-distribution { top: 75%; left: 78%; }
        .p-industries { top: 75%; left: 22%; }

        .close-btn { margin-top: 30px; cursor: pointer; color: #fff; font-size: 10px; font-weight: 900; letter-spacing: 0.4em; border: 1px solid rgba(255,255,255,0.2); padding: 12px 30px; }
    </style>
</head>
<body>

    <a href="/" class="logo-fixed-center">
        <img src="Logoc.png" alt="Prominex Global">
    </a>

    <header id="main-header" class="relative h-screen w-full bg-black overflow-hidden px-6 md:px-24">
        <div class="absolute inset-0 z-0"> 
            <img src="assets/ship.webp" class="w-full h-full object-cover opacity-50"> 
            <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black"></div>
        </div>
        
        <div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
            <div class="rotator-container">
                <h1 class="rotator-text active font-black uppercase mirror-gloss" style="font-size: clamp(1.5rem, 8vw, 5rem);">Integrated <br>Supply Chain</h1>
                <h1 class="rotator-text font-black uppercase mirror-gloss" style="font-size: clamp(1.5rem, 8vw, 5rem);">Global <br>Sourcing</h1>
                <h1 class="rotator-text font-black uppercase mirror-gloss" style="font-size: clamp(1.5rem, 8vw, 5rem);">Single Point<br>Accountability</h1>
            </div>
        </div>

        <div class="absolute bottom-10 left-6 right-6 md:left-24 md:right-24 z-20">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <a href="contact" class="bg-blue-600 text-white px-8 py-4 font-black uppercase tracking-widest text-[10px] hover:bg-white hover:text-blue-600 transition-all text-center w-full md:w-fit">Partner With Us</a>
                <button onclick="toggleMenu()" class="bg-white text-black px-8 py-4 font-black uppercase tracking-widest text-[10px] flex items-center justify-center gap-4 hover:bg-blue-600 hover:text-white transition-all w-full md:w-fit">
                    <span>Explore Network</span>
                    <div class="flex flex-col gap-1"><div class="w-4 h-0.5 bg-current"></div><div class="w-4 h-0.5 bg-current opacity-50"></div></div>
                </button>
            </div>
        </div>
    </header>

    <div id="menu-overlay">
        <div class="canvas-area">
            <svg class="inf-svg" viewBox="0 0 800 400">
                <path class="path-base" d="M400,200 C550,60 750,60 750,200 C750,340 550,340 400,200 C250,60 50,60 50,200 C50,340 250,340 400,200" />
                <path class="signal" d="M400,200 C550,60 750,60 750,200 C750,340 550,340 400,200 C250,60 50,60 50,200 C50,340 250,340 400,200" />
            </svg>
            <a href="industries" class="node p-about"><div class="node-icon"><i class="fas fa-city"></i></div><span class="node-label">Industry Verticals</span></a>
            <a href="sourcing" class="node p-sourcing"><div class="node-icon"><i class="fas fa-handshake-angle"></i></div><span class="node-label">Supplier Management</span></a>
            <a href="logistics" class="node p-logistics"><div class="node-icon"><i class="fas fa-ship"></i></div><span class="node-label">Freight Management</span></a>
            <a href="distribution" class="node p-distribution"><div class="node-icon"><i class="fas fa-boxes-packing"></i></div><span class="node-label">Logistics Management</span></a>
            <a href="manufacturing" class="node p-industries"><div class="node-icon"><i class="fas fa-industry"></i></div><span class="node-label">Manufacturing</span></a>
        </div>

        <div class="mobile-node-list">
            <a href="industries" class="m-node"><i class="fas fa-city"></i> Industry Verticals</a>
            <a href="sourcing" class="m-node"><i class="fas fa-handshake-angle"></i> Sourcing</a>
            <a href="logistics" class="m-node"><i class="fas fa-ship"></i> Freight</a>
            <a href="distribution" class="m-node"><i class="fas fa-boxes-packing"></i> Logistics</a>
            <a href="manufacturing" class="m-node"><i class="fas fa-industry"></i> Manufacturing</a>
        </div>
        
        <div class="close-btn" onclick="toggleMenu()">CLOSE HUB</div>
    </div>

    <script>
        function toggleMenu() { 
            const overlay = document.getElementById('menu-overlay');
            const header = document.getElementById('main-header');
            overlay.classList.toggle('open');
            header.style.opacity = overlay.classList.contains('open') ? "0" : "1";
        }
        let idx = 0; const slides = document.querySelectorAll('.rotator-text');
        setInterval(() => {
            slides[idx].classList.remove('active'); 
            idx = (idx + 1) % slides.length; 
            slides[idx].classList.add('active'); 
        }, 4000);
    </script>
</body>
</html>
