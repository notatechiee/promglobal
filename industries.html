<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industry Sectors | Prominex Global</title>
    <meta name="description" content="Explore industrial verticals served by Prominex Global: Foodservice, Healthcare, Precision Engineering, and Specialty Chemicals.">
    <link rel="icon" type="image/png" href="assets/favicon-new.PNG">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        html, body { 
            height: 100vh; width: 100vw; margin: 0; 
            overflow: hidden; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            background-color: #0f172a; /* Consistent dark base */
        }

        /* GHOST BACKGROUND LAYER */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('assets/contactpromp.webp');
            background-size: cover;
            background-position: center;
            filter: grayscale(1) brightness(0.7);
            opacity: 0.08;
            z-index: -1;
        }

        /* --- NAVIGATION --- */
        .nav-home {
            position: absolute; top: 50px; left: 60px;
            color: #fff; font-size: 11px;
            font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.4em;
            text-decoration: none; 
            z-index: 1000;
            transition: all 0.4s ease;
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .nav-home:hover { 
            background: #3b82f6;
            color: #fff; 
            transform: translateX(8px);
            border-color: #3b82f6;
        }

        /* --- SECTOR GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 300px);
            grid-template-rows: repeat(2, 300px);
            gap: 30px;
            z-index: 10;
            position: relative;
        }

        .sector-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; text-align: center; padding: 40px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        /* Sublte Glow on Hover */
        .sector-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .sector-card:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: #3b82f6;
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .sector-card:hover::after { opacity: 1; }

        .icon-box {
            font-size: 3.5rem; color: #3b82f6; margin-bottom: 24px;
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.3));
            transition: all 0.4s ease;
            z-index: 2;
        }

        .sector-card:hover .icon-box { 
            color: #fff; 
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6));
        }

        .title-text {
            font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.2em; font-size: 13px;
            color: #f8fafc; line-height: 1.5;
            z-index: 2;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            html, body { overflow-y: auto; height: auto; padding: 100px 20px 40px; }
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                width: 100%;
                max-width: 400px;
            }
            .nav-home { top: 30px; left: 20px; font-size: 9px; padding: 10px 18px; }
            .sector-card { padding: 50px 30px; height: 260px; }
        }
    </style>
</head>
<body>
    
    <a href="index.html?menu=open" class="nav-home">
        <i class="fas fa-network-wired"></i> Network Hub
    </a>

    <div class="grid-container">
        <a href="industry-detail.html?cat=foodservice" class="sector-card">
            <i class="fas fa-boxes-packing icon-box"></i>
            <span class="title-text">Foodservice & <br>Packaging</span>
        </a>

        <a href="industry-detail.html?cat=patientcare" class="sector-card">
            <i class="fas fa-hand-holding-medical icon-box"></i>
            <span class="title-text">Patient Care & <br>Sterile Supply</span>
        </a>

        <a href="industry-detail.html?cat=precision" class="sector-card">
            <i class="fas fa-microchip icon-box"></i>
            <span class="title-text">Precision <br>Components</span>
        </a>

        <a href="industry-detail.html?cat=chemicals" class="sector-card">
            <i class="fas fa-flask-vial icon-box"></i>
            <span class="title-text">Specialty <br>Chemicals</span>
        </a>
    </div>

</body>
</html>
