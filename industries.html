<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industry Sectors | Prominex Global</title>
    <link rel="icon" type="image/png" href="assets/favicon-new.PNG">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        html, body { 
            height: 100vh; width: 100vw; margin: 0; 
            overflow: hidden; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            background-color: #0f172a; /* Solid dark floor */
        }

        /* BOOSTED BACKGROUND VISIBILITY */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('assets/contactpromp.webp');
            background-size: cover;
            background-position: center;
            filter: brightness(0.9); /* Less darkening */
            opacity: 0.15; /* Increased from 0.08 for visibility */
            z-index: -1;
        }

        /* --- NAVIGATION --- */
        .nav-home {
            position: absolute; top: 40px; left: 60px;
            color: #fff; font-size: 10px;
            font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.4em;
            text-decoration: none; 
            z-index: 1000;
            transition: all 0.4s ease;
            display: flex; align-items: center; gap: 12px;
            background: rgba(30, 41, 59, 0.8);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .nav-home:hover { 
            background: #3b82f6;
            transform: translateX(8px);
        }

        /* --- REDUCED GRID SIZE --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 260px); /* Dropped from 300px */
            grid-template-rows: repeat(2, 260px);    /* Dropped from 300px */
            gap: 25px;
            z-index: 10;
            position: relative;
            margin-top: 40px; /* Buffers the top nav */
        }

        .sector-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; text-align: center; padding: 30px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .sector-card:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: #3b82f6;
            /* Gentler hover shift to avoid hitting top nav */
            transform: scale(1.03) translateY(-6px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .icon-box {
            font-size: 3rem; color: #3b82f6; margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
            transition: all 0.3s ease;
        }

        .sector-card:hover .icon-box { 
            color: #fff; 
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6));
        }

        .title-text {
            font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.15em; font-size: 11px;
            color: #f8fafc; line-height: 1.5;
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            html, body { overflow-y: auto; height: auto; padding: 120px 20px 40px; }
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                width: 100%;
                max-width: 320px;
                margin-top: 0;
            }
            .nav-home { top: 25px; left: 20px; }
            .sector-card { height: 240px; }
        }
    </style>
</head>
<body>
    
    <a href="index.html?menu=open" class="nav-home">
        <i class="fas fa-network-wired"></i> Network Hub
    </a>

    <div class="grid-container">
        <a href="industry-detail.html?cat=foodservice" class="sector-card">
            <i class="fas fa-boxes-packing icon-box"></i>
            <span class="title-text">Foodservice & <br>Packaging</span>
        </a>

        <a href="industry-detail.html?cat=patientcare" class="sector-card">
            <i class="fas fa-hand-holding-medical icon-box"></i>
            <span class="title-text">Patient Care & <br>Sterile Supply</span>
        </a>

        <a href="industry-detail.html?cat=precision" class="sector-card">
            <i class="fas fa-microchip icon-box"></i>
            <span class="title-text">Precision <br>Components</span>
        </a>

        <a href="industry-detail.html?cat=chemicals" class="sector-card">
            <i class="fas fa-flask-vial icon-box"></i>
            <span class="title-text">Specialty <br>Chemicals</span>
        </a>
    </div>

</body>
</html>
