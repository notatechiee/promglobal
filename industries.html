<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industry Sectors | Prominex Global</title>
    <link rel="icon" type="image/png" href="assets/favicon-new.PNG">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        
        /* 1. THE BASEMENT (Darkness) */
        html {
            background-color: #000;
        }

        body { 
            height: 100vh; width: 100vw; margin: 0; 
            overflow: hidden; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            background: transparent; /* Must be transparent for image to show */
        }

        /* 2. THE BACKGROUND IMAGE LAYER */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('assets/contactpromp.webp');
            background-size: cover;
            background-position: center;
            /* We use opacity here instead of filter for better performance */
            opacity: 0.25; 
            filter: grayscale(0.5) blur(1px);
            z-index: -1;
            pointer-events: none;
        }

        /* --- NAVIGATION --- */
        .nav-home {
            position: absolute; top: 40px; left: 50px;
            color: #fff; font-size: 11px;
            font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.4em;
            text-decoration: none; 
            z-index: 1000;
            transition: all 0.4s ease;
            display: flex; align-items: center; gap: 10px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .nav-home:hover { 
            background: #3b82f6;
            color: #fff; 
            transform: translateX(5px);
        }

        /* --- OPTIMIZED GRID --- */
        .grid-container {
            display: grid;
            /* Reduced size so it doesn't hit the top on laptops */
            grid-template-columns: repeat(2, 250px);
            grid-template-rows: repeat(2, 250px);
            gap: 25px;
            z-index: 10;
            position: relative;
        }

        .sector-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; text-align: center; padding: 25px;
            
            /* --- STABILIZERS --- */
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            backface-visibility: hidden; /* Prevents the 'shiver' */
            -webkit-font-smoothing: subpixel-antialiased;
            transform: translateZ(0); /* Forces GPU acceleration */
            will-change: transform, box-shadow; /* Prepares browser for the move */
        }

        .sector-card:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: #3b82f6;
            
            /* Combined transform: simplified to prevent rounding jitters */
            transform: scale(1.04) translateY(-4px); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .icon-box {
            font-size: 3rem; color: #3b82f6; margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4));
            transition: all 0.3s ease;
        }

        .sector-card:hover .icon-box { color: #fff; transform: scale(1.1); }

        .title-text {
            font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.15em; font-size: 11px;
            color: #fff; line-height: 1.4;
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            html, body { overflow-y: auto; height: auto; padding: 100px 20px 40px; }
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                width: 100%;
                max-width: 300px;
            }
            .nav-home { top: 25px; left: 20px; font-size: 9px; }
            .sector-card { height: 250px; }
        }
    </style>
</head>
<body>

    <a href="/?menu=open" class="nav-home">
        <i class="fas fa-arrow-left"></i> Network Hub
    </a>

    <div class="grid-container">
        <a href="industry-detail?cat=foodservice" class="sector-card">
            <i class="fas fa-boxes-packing icon-box"></i>
            <span class="title-text">Foodservice & <br>Packaging</span>
        </a>
        <a href="industry-detail?cat=patientcare" class="sector-card">
            <i class="fas fa-hand-holding-medical icon-box"></i>
            <span class="title-text">Patient Care & <br>Sterile Supply</span>
        </a>
        <a href="industry-detail?cat=precision" class="sector-card">
            <i class="fas fa-microchip icon-box"></i>
            <span class="title-text">Precision <br>Components</span>
        </a>
        <a href="industry-detail?cat=chemicals" class="sector-card">
            <i class="fas fa-flask-vial icon-box"></i>
            <span class="title-text">Specialty <br>Chemicals</span>
        </a>
    </div>

</body>
</html>
