<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Prominex Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        html, body { 
            height: 100vh; width: 100vw; margin: 0; padding: 0;
            overflow: hidden; background-color: #ffffff; 
            font-family: 'Inter', sans-serif; 
        }

        .bg-overlay {
            position: fixed; inset: 0;
            background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&q=80');
            background-size: cover; background-position: center;
            filter: grayscale(1) brightness(1.1) opacity(0.08);
            z-index: -1;
        }

        /* --- ENHANCED BACK BUTTON --- */
        .nav-back {
            position: absolute; top: 40px; left: 60px;
            color: #ffffff; background: #1e293b;
            padding: 12px 24px; border-radius: 50px;
            font-size: 12px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.3em; text-decoration: none;
            z-index: 1000; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 10px;
        }
        .nav-back:hover { 
            background: #3b82f6; transform: translateX(8px) scale(1.05);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
        }

        /* --- HEADING SYSTEM --- */
        .main-heading { display: flex; flex-direction: column; line-height: 0.95; margin-bottom: 2.5rem; }
        .line-stack { display: flex; align-items: center; white-space: nowrap; }
        .line-your { 
            color: #cbd5e1; font-weight: 300; font-size: 0.7em; 
            letter-spacing: 0.5em; padding-left: 140px; margin: 10px 0;
        }

        .word-wrapper {
            display: inline-flex; height: 1.1em; overflow: hidden;
            vertical-align: bottom; position: relative; min-width: 320px;
        }

        .dynamic-text {
            display: block; position: absolute; left: 0; width: 100%;
            transition: all 0.2s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .word-exit { transform: translateY(-100%); opacity: 0; }
        .word-enter { transform: translateY(100%); opacity: 0; }

        /* --- CONTACT SIDEBAR --- */
        .contact-sidebar { border-left: 4px solid #3b82f6; padding-left: 28px; margin-top: 3rem; }
        .info-label { font-size: 10px; font-weight: 900; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 8px; }
        .info-value { font-size: 15px; font-weight: 800; color: #1e293b; line-height: 1.6; max-width: 320px; }

        /* --- FORM ARCHITECTURE --- */
        .form-container { width: 100%; max-width: 650px; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.97); 
            backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px; padding: 3.5rem;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.6);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; padding: 14px 18px; width: 100%; color: #ffffff; font-size: 13px;
            transition: all 0.3s ease;
        }
        .input-field:focus { 
            border-color: #3b82f6; outline: none; background: rgba(255, 255, 255, 0.08); 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }
        .label-text { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #3b82f6; letter-spacing: 0.2em; margin-bottom: 10px; display: block; }

        /* --- RESTORED BUTTON EFFECTS --- */
        .submit-btn {
            background: #3b82f6; color: white; padding: 20px; border-radius: 14px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 0.4em; font-size: 11px; width: 100%; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center; align-items: center; border: none;
        }
        .submit-btn:hover { background: #2563eb; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn.btn-success { background: #10b981 !important; box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4); }

        .footer-text { color: #94a3b8; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5em; text-align: center; margin-top: 25px; }
        
        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="bg-overlay"></div>
    <a href="index.html?menu=open" class="nav-back"><i class="fas fa-arrow-left"></i> NETWORK HUB</a>

    <div class="max-w-[1440px] w-full px-16 flex flex-col lg:flex-row items-center justify-between gap-16">
        
        <div class="flex-1 lg:max-w-[550px]">
            <h1 class="main-heading text-5xl md:text-7xl font-black uppercase text-slate-900 tracking-tighter">
                <span class="line-stack">Let's <span class="word-wrapper text-blue-600 ml-5"><span id="verb-word" class="dynamic-text">Secure</span></span></span>
                <span class="line-stack line-your">Your</span>
                <span class="line-stack"><span class="word-wrapper"><span id="vertical-word" class="dynamic-text">Supply Chain.</span></span></span>
            </h1>

            <div class="contact-sidebar">
                <div class="mb-10">
                    <div class="info-label">Global Command Center</div>
                    <div class="info-value">Plot 778-780, Killa-Pardi,<br>Valsad, Gujarat, India</div>
                </div>
                <div>
                    <div class="info-label">Digital Uplink</div>
                    <div class="info-value">info@prominexglobal.com</div>
                </div>
            </div>
        </div>

        <div class="form-container">
            <div class="glass-panel">
                <form id="contactForm" class="space-y-6">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Classification</label>
                            <select class="input-field" required>
                                <option value="" disabled selected>Select Role</option>
                                <option>Buyer / Importer</option>
                                <option>Supplier / Manufacturer</option>
                                <option>Strategic Partner</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Business Entity</label>
                            <input type="text" placeholder="Company Name" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Representative</label>
                            <input type="text" placeholder="Full Name" class="input-field" required>
                        </div>
                        <div>
                            <label class="label-text">Contact Email</label>
                            <input type="email" placeholder="work@domain.com" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">City</label>
                            <input type="text" placeholder="Base Operation" class="input-field" required>
                        </div>
                        <div>
                            <label class="label-text">Country</label>
                            <input type="text" placeholder="Nation" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Primary Vertical</label>
                            <select class="input-field">
                                <option>Manufacturing</option>
                                <option>Global Sourcing</option>
                                <option>Logistics Sync</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Priority Level</label>
                            <select class="input-field">
                                <option>Standard Action</option>
                                <option>Priority Protocol</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="label-text">Operational Parameters</label>
                        <textarea rows="2" placeholder="Define project requirements..." class="input-field resize-none"></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="submit-btn">
                        <span id="btnText">Execute Transmission</span> <i id="btnIcon" class="fas fa-bolt ml-3"></i>
                    </button>
                </form>
            </div>
            <div class="footer-text">Prominex Global © 2026 | Authority in Logistics</div>
        </div>
    </div>

    <script>
        // DYNAMIC WORDS
        const verbs = ["Secure", "Optimize", "Scale", "Direct", "Evolve"];
        const verticals = ["Supply Chain.", "Procurement.", "Logistics.", "Fulfillment.", "Operations."];
        let i = 0;
        const verbEl = document.getElementById("verb-word");
        const vertEl = document.getElementById("vertical-word");

        setInterval(() => {
            verbEl.classList.add("word-exit");
            vertEl.classList.add("word-exit");
            setTimeout(() => {
                i = (i + 1) % verbs.length;
                verbEl.innerText = verbs[i];
                vertEl.innerText = verticals[i];
                verbEl.classList.remove("word-exit");
                verbEl.classList.add("word-enter");
                vertEl.classList.remove("word-exit");
                vertEl.classList.add("word-enter");
                setTimeout(() => {
                    verbEl.classList.remove("word-enter");
                    vertEl.classList.remove("word-enter");
                }, 20);
            }, 150);
        }, 2200);

        // FORM SUBMISSION ANIMATION
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            btnText.innerText = "Transmitting...";
            btnIcon.className = "fas fa-sync fa-spin ml-3";
            
            setTimeout(() => {
                btn.classList.add('btn-success');
                btnText.innerText = "Protocol Secure";
                btnIcon.className = "fas fa-check-circle ml-3";
                
                setTimeout(() => {
                    btn.classList.remove('btn-success');
                    btnText.innerText = "Execute Transmission";
                    btnIcon.className = "fas fa-bolt ml-3";
                    form.reset();
                }, 4000);
            }, 1800);
        });
    </script>
</body>
</html>
