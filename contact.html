<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Prominex Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        html, body { 
            height: 100vh; width: 100vw; margin: 0; padding: 0;
            overflow: hidden; background-color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; align-items: center; justify-content: center;
        }

        .bg-overlay {
            position: fixed; inset: 0;
            background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&q=80');
            background-size: cover; background-position: center;
            filter: grayscale(1) brightness(1.1) opacity(0.06);
            z-index: -1;
        }

        .nav-back {
            position: absolute; top: 40px; left: 40px;
            color: #1e293b; font-size: 11px; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 0.5em;
            text-decoration: none; border-bottom: 2px solid rgba(30, 41, 59, 0.1);
            z-index: 1000;
            transition: all 0.4s ease;
            padding-bottom: 4px;
        }
        .nav-back:hover { border-bottom-color: #3b82f6; color: #3b82f6; transform: translateX(5px); }

        .main-heading { display: block; line-height: 1.1; margin-bottom: 2.5rem; }
        .line-one { display: block; margin-bottom: 0.2em; }

        .word-wrapper {
            display: inline-flex; height: 1.1em; overflow: hidden;
            vertical-align: bottom;
            position: relative; min-width: 280px;
        }

        #dynamic-word {
            display: block; position: absolute; left: 0; width: 100%;
            transition: all 0.15s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .word-exit { transform: translateY(-100%); opacity: 0; }
        .word-enter { transform: translateY(100%); opacity: 0; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.94); 
            backdrop-filter: blur(30px) saturate(150%);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px; padding: 2.5rem 3rem;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 20;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; padding: 12px 16px; width: 100%;
            color: #ffffff; outline: none; font-size: 13px;
            transition: all 0.3s ease;
        }
        .input-field:focus { background: rgba(255, 255, 255, 0.1); border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .input-field::placeholder { color: rgba(255, 255, 255, 0.3); }

        .label-text {
            font-size: 9px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.25em; color: #3b82f6; margin-bottom: 6px; display: block;
        }

        .submit-btn {
            background: #3b82f6; color: white; padding: 18px; 
            border-radius: 14px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.4em; font-size: 11px; width: 100%;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            margin-top: 5px;
        }
        .submit-btn:hover { background: #2563eb; transform: translateY(-2px); }
        .submit-btn.btn-success { background: #10b981 !important; }

        .info-card { display: flex; align-items: center; gap: 15px; }
        .info-icon { color: #3b82f6; font-size: 18px; min-width: 25px; text-align: center; }
        .info-label { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.2em; }
        .info-value { font-size: 13px; font-weight: 800; color: #1e293b; line-height: 1.2; }

        .footer-text { color: #94a3b8; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5em; text-align: center; margin-top: 20px; }
        
        select.input-field option { background: #0f172a; color: #fff; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <a href="index.html?menu=open" class="nav-back">← Network Hub</a>

    <div class="max-w-[1440px] w-full grid grid-cols-1 lg:grid-cols-12 gap-16 px-16 items-center">
        
        <div class="lg:col-span-5">
            <h1 class="main-heading text-5xl md:text-7xl font-black uppercase text-slate-900 tracking-tighter">
                <span class="line-one">Let's <span class="word-wrapper text-blue-600"><span id="dynamic-word">Secure</span></span></span>
                <span class="line-two block">Your Supply Chain.</span>
            </h1>

            <div class="grid grid-cols-1 gap-y-6 border-t border-slate-100 pt-8">
                <div class="info-card">
                    <i class="fas fa-map-marker-alt info-icon"></i>
                    <div>
                        <div class="info-label">Global HQ</div>
                        <div class="info-value">Valsad, Gujarat, India</div>
                    </div>
                </div>
                <div class="info-card">
                    <i class="fas fa-envelope info-icon"></i>
                    <div>
                        <div class="info-label">EMAIL</div>
                        <div class="info-value">info@prominexglobal.com</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="glass-panel">
                <form id="contactForm" class="space-y-4">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">Entity Classification</label>
                            <select class="input-field" required>
                                <option value="" disabled selected>Select Role...</option>
                                <option>Buyer / Importer</option>
                                <option>Supplier / Manufacturer</option>
                                <option>Strategic Partner</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Business Name</label>
                            <input type="text" placeholder="Company Legal Name" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">Full Name</label>
                            <input type="text" placeholder="Representative Name" class="input-field" required>
                        </div>
                        <div>
                            <label class="label-text">Email Address</label>
                            <input type="email" placeholder="email@company.com" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">City</label>
                            <input type="text" placeholder="Operation Base" class="input-field" required>
                        </div>
                        <div>
                            <label class="label-text">Country</label>
                            <input type="text" placeholder="Region" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">Industrial Vertical</label>
                            <select class="input-field">
                                <option>Manufacturing</option>
                                <option>Supply Chain Sync</option>
                                <option>Strategic Sourcing</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Urgency</label>
                            <select class="input-field">
                                <option>Standard Action</option>
                                <option>Priority Deployment</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="label-text">Strategic Brief</label>
                        <textarea rows="2" placeholder="Define project parameters..." class="input-field resize-none"></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="submit-btn">
                        <span id="btnText">Execute Transmission</span> <i id="btnIcon" class="fas fa-bolt ml-3"></i>
                    </button>
                </form>
            </div>
            
            <div class="footer-text">
                Prominex Global © 2026 | Supply Chain Reimagined
            </div>
        </div>
    </div>

    <script>
        const words = ["Secure", "Optimize", "Scale", "Direct", "Evolve"];
        let i = 0;
        const wordElement = document.getElementById("dynamic-word");
        setInterval(() => {
            wordElement.classList.add("word-exit");
            setTimeout(() => {
                i = (i + 1) % words.length;
                wordElement.innerText = words[i];
                wordElement.classList.remove("word-exit");
                wordElement.classList.add("word-enter");
                setTimeout(() => wordElement.classList.remove("word-enter"), 20); 
            }, 150); 
        }, 2000); 

        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            btnText.innerText = "Transmitting...";
            btnIcon.className = "fas fa-sync fa-spin ml-3";
            setTimeout(() => {
                btn.classList.add('btn-success');
                btnText.innerText = "Protocol Secure";
                btnIcon.className = "fas fa-check-circle ml-3";
                setTimeout(() => {
                    btn.classList.remove('btn-success');
                    btnText.innerText = "Execute Transmission";
                    btnIcon.className = "fas fa-bolt ml-3";
                    form.reset();
                }, 4000);
            }, 1800);
        });
    </script>
</body>
</html>
