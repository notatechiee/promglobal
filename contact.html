<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Contact | Prominex Global</title>
    <meta name="description" content="Contact Prominex Global for supply chain solutions, logistics, and industrial consultancy.">
    <link rel="canonical" href="https://prominexglobal.com/contact">
    <link rel="icon" type="image/png" href="assets/favicon-new.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        html, body { 
            min-height: 100vh; width: 100vw; margin: 0; padding: 0;
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; /* Dark base makes the image visible through opacity */
            overflow-x: hidden;
        }

        /* NEW HIGH-VISIBILITY BACKGROUND LAYER */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('assets/contactpromp.webp');
            background-size: cover;
            background-position: center;
            filter: grayscale(1) brightness(0.8);
            opacity: 0.12; /* Adjust this (0.1 to 0.2) to see more/less of the image */
            z-index: -1;
        }

        .nav-back {
            position: absolute; top: 40px; left: 60px;
            color: #ffffff; background: #1e293b;
            padding: 12px 24px; border-radius: 50px;
            font-size: 10px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.3em; text-decoration: none;
            z-index: 1000; transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-back:hover { background: #3b82f6; transform: translateX(10px); }

        .branding-section {
            flex: 0 0 45%;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* Contrast Adjustment for Text on Darker Background */
        .main-heading { line-height: 0.9; width: 100%; color: white; }
        .line-stack { display: flex; align-items: center; white-space: nowrap; width: 100%; }
        
        .line-your { 
            color: #EB0000; 
            font-weight: 300; 
            font-size: 0.7em; 
            letter-spacing: 0.4em; 
            text-align: center; 
            margin: 8px 0;
            width: 100%;
            display: block; 
        }

        .word-wrapper {
            display: inline-flex; height: 1.1em; overflow: hidden;
            vertical-align: bottom; position: relative; 
            flex-grow: 1;
        }

        .dynamic-text {
            display: block; position: absolute; left: 0; width: 100%;
            transition: all 0.2s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .word-exit { transform: translateY(-100%); opacity: 0; }
        .word-enter { transform: translateY(100%); opacity: 0; }

        .contact-sidebar { border-left: 4px solid #3b82f6; padding-left: 20px; margin-top: 2rem; }
        .info-label { font-size: 10px; font-weight: 900; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.2em; }
        .info-value { font-size: 14px; font-weight: 800; color: #e2e8f0; line-height: 1.4; margin-bottom: 1rem; }

        .form-container { 
            flex: 0 0 50%;
            display: flex; flex-direction: column; justify-content: center;
        } 
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; 
            padding: 2.8rem; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        .input-group { position: relative; width: 100%; }
        .input-field {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; padding: 14px; width: 100%; color: #ffffff; font-size: 11px;
            transition: all 0.3s; appearance: none;
        }
        .input-field:hover { border-color: rgba(255, 255, 255, 0.2); }
        .input-field:focus { border-color: #3b82f6; outline: none; background: rgba(255, 255, 255, 0.08); }
        
        select.input-field option { background: #0f172a; color: white; }
        .label-text { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; display: block; letter-spacing: 0.1em; }

        .submit-btn {
            background: #3b82f6; color: white; padding: 18px; border-radius: 12px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 0.3em; font-size: 10px; width: 100%; cursor: pointer; 
            border: none; margin-top: 10px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .submit-btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4); }
        .submit-btn.success { background: #10b981 !important; pointer-events: none; }

        .footer-text { 
            color: #64748b; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            text-align: center; 
            margin-top: 24px; 
            letter-spacing: 0.1em;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 1024px) {
            body { overflow-y: auto; padding: 20px !important; }
            .nav-back { top: 20px; left: 20px; padding: 8px 16px; font-size: 8px; }
            .w-full.max-w-\[1400px\] { flex-direction: column !important; gap: 40px !important; margin-top: 80px; }
            .branding-section, .form-container { flex: 0 0 100%; width: 100%; }
            .main-heading { text-align: center; font-size: 3rem !important; }
            .line-stack { justify-content: center; }
            .glass-panel { padding: 1.8rem; }
            #contactForm { grid-template-columns: 1fr !important; }
            .col-span-2 { grid-column: span 1 / span 1 !important; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-12">

    <a href="index.html" class="nav-back">
        <i class="fas fa-chevron-left"></i> BACK TO HUB
    </a>

    <div class="w-full max-w-[1400px] h-full flex flex-row items-center justify-between gap-6">
        
        <div class="branding-section">
            <h1 class="main-heading text-5xl lg:text-7xl font-black uppercase tracking-tighter">
                <span class="line-stack">Let's <span class="word-wrapper text-blue-500 ml-4"><span id="verb-word" class="dynamic-text">Secure</span></span></span>
                <span class="line-stack line-your">Your</span>
                <span class="line-stack"><span class="word-wrapper"><span id="vertical-word" class="dynamic-text">Supply Chain.</span></span></span>
            </h1>

            <div class="contact-sidebar">
                <div>
                    <div class="info-label">Global HQ</div>
                    <div class="info-value">Plot 778-780, Killa-Pardi,<br>Valsad, Gujarat, India</div>
                </div>
                <div>
                    <div class="info-label">Secure Access</div>
                    <div class="info-value">info@prominexglobal.com</div>
                </div>
            </div>
        </div>

        <div class="form-container">
            <div class="glass-panel">
                <form id="contactForm" class="grid grid-cols-2 gap-x-6 gap-y-4">
                    <div class="input-group">
                        <label class="label-text">Classification</label>
                        <select class="input-field" required>
                            <option value="" disabled selected>Select Role</option>
                            <option>Buyer / Importer</option>
                            <option>Supplier / Manufacturer</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="label-text">Business Entity</label>
                        <input type="text" placeholder="Legal Name" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label class="label-text">Representative</label>
                        <input type="text" placeholder="Full Name" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label class="label-text">Direct Email</label>
                        <input type="email" placeholder="corporate@domain.com" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label class="label-text">City</label>
                        <input type="text" placeholder="Location" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label class="label-text">Country</label>
                        <input type="text" placeholder="Nation" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label class="label-text">Industrial Vertical</label>
                        <select class="input-field">
                            <option>Manufacturing</option>
                            <option>Sourcing</option>
                            <option>Logistics Sync</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="label-text">Priority Status</label>
                        <select class="input-field">
                            <option>Standard Action</option>
                            <option>Priority Protocol</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="label-text">How Can We Support You</label>
                        <textarea rows="1" placeholder="Define project parameters..." class="input-field resize-none"></textarea>
                    </div>
                    <div class="col-span-2">
                        <button type="submit" id="submitBtn" class="submit-btn">
                            <span id="btnText">SEND</span>
                        </button>
                    </div>
                </form>
            </div>
            <div class="footer-text">Prominex Global © 2026 | SUPPLY CHAIN REIMAGINED</div>
        </div>
    </div>

    <script>
        // Form Logic
        const contactForm = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            btnText.innerText = "TRANSMITTING...";
            submitBtn.style.opacity = "0.7";
            submitBtn.style.pointerEvents = "none";

            setTimeout(() => {
                submitBtn.classList.add('success');
                submitBtn.style.opacity = "1";
                btnText.innerHTML = '<i class="fas fa-check"></i> TRANSMITTED';
                
                setTimeout(() => {
                    submitBtn.classList.remove('success');
                    btnText.innerText = "SEND";
                    submitBtn.style.pointerEvents = "auto";
                    contactForm.reset();
                }, 3000);
            }, 1500);
        });

        // Text Animation Logic
        const verbs = ["Engineer", "Refine", "Leverage", "Scale", "Optimize"];
        const verticals = ["Supply Chain.", "Procurement.", "Logistics.", "Fulfillment.", "Operations."];
        let i = 0;
        const verbEl = document.getElementById("verb-word");
        const vertEl = document.getElementById("vertical-word");

        setInterval(() => {
            verbEl.classList.add("word-exit");
            vertEl.classList.add("word-exit");
            setTimeout(() => {
                i = (i + 1) % verbs.length;
                verbEl.innerText = verbs[i];
                vertEl.innerText = verticals[i];
                verbEl.classList.remove("word-exit");
                verbEl.classList.add("word-enter");
                vertEl.classList.remove("word-exit");
                vertEl.classList.add("word-enter");
                setTimeout(() => {
                    verbEl.classList.remove("word-enter");
                    vertEl.classList.remove("word-enter");
                }, 20);
            }, 150);
        }, 2200);
    </script>
</body>
</html>
