<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Prominex Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        html, body { 
            height: 100vh; width: 100vw; margin: 0; padding: 0;
            overflow: hidden; background-color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; align-items: center; justify-content: center;
        }

        .bg-overlay {
            position: fixed; inset: 0;
            background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&q=80');
            background-size: cover; background-position: center;
            filter: grayscale(1) brightness(1.1) opacity(0.06);
            z-index: -1;
        }

        .nav-back {
            position: absolute; top: 40px; left: 40px;
            color: #1e293b; font-size: 11px; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 0.5em;
            text-decoration: none; border-bottom: 2px solid rgba(30, 41, 59, 0.1);
            z-index: 1000; transition: all 0.4s ease; padding-bottom: 4px;
        }
        .nav-back:hover { border-bottom-color: #3b82f6; color: #3b82f6; transform: translateX(5px); }

        /* --- THE BALANCED HEADING --- */
        .main-heading { display: flex; flex-direction: column; gap: 0.2em; line-height: 1; margin-bottom: 2.5rem; }
        
        .line-stack { display: flex; align-items: center; white-space: nowrap; }
        .line-center { justify-content: center; width: fit-content; margin: 0 auto; } /* Centering 'YOUR' */

        .word-wrapper {
            display: inline-flex; height: 1.1em; overflow: hidden;
            vertical-align: bottom; position: relative; min-width: 260px;
        }

        .dynamic-text {
            display: block; position: absolute; left: 0; width: 100%;
            transition: all 0.15s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .word-exit { transform: translateY(-100%); opacity: 0; }
        .word-enter { transform: translateY(100%); opacity: 0; }

        /* --- THE SCROLLABLE GLASS PANEL --- */
        .glass-panel {
            background: rgba(15, 23, 42, 0.94); 
            backdrop-filter: blur(30px) saturate(150%);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px; padding: 2.5rem;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 20;
            max-height: 85vh; /* Prevents cutting off */
            overflow-y: auto;
        }

        /* Hide scrollbar but keep functionality */
        .glass-panel::-webkit-scrollbar { width: 4px; }
        .glass-panel::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }

        .input-field {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; padding: 12px 16px; width: 100%; color: #ffffff; outline: none; font-size: 13px;
        }
        .label-text { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.25em; color: #3b82f6; margin-bottom: 6px; display: block; }

        .submit-btn {
            background: #3b82f6; color: white; padding: 18px; border-radius: 14px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 0.4em; font-size: 11px; width: 100%; cursor: pointer;
        }

        .info-card { display: flex; align-items: center; gap: 12px; }
        .info-label { font-size: 8px; font-weight: 900; color: #94a3b8; text-transform: uppercase; }
        .info-value { font-size: 12px; font-weight: 800; color: #1e293b; }

        .footer-text { color: #94a3b8; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5em; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <a href="index.html?menu=open" class="nav-back">← Network Hub</a>

    <div class="max-w-[1600px] w-full grid grid-cols-1 lg:grid-cols-12 gap-8 px-12 items-center">
        
        <div class="lg:col-span-4">
            <h1 class="main-heading text-4xl md:text-6xl font-black uppercase text-slate-900 tracking-tighter">
                <span class="line-stack">
                    Let's <span class="word-wrapper text-blue-600 ml-3"><span id="verb-word" class="dynamic-text">Secure</span></span>
                </span>
                <span class="line-stack line-center text-slate-300 ml-20">Your</span>
                <span class="line-stack">
                    <span class="word-wrapper text-slate-900"><span id="vertical-word" class="dynamic-text">Supply Chain.</span></span>
                </span>
            </h1>

            <div class="space-y-4 border-t border-slate-100 pt-6">
                <div class="info-card">
                    <i class="fas fa-map-marker-alt text-blue-600"></i>
                    <div><div class="info-label">Base</div><div class="info-value">Gujarat, India</div></div>
                </div>
                <div class="info-card">
                    <i class="fas fa-envelope text-blue-600"></i>
                    <div><div class="info-label">EMAIL</div><div class="info-value">info@prominexglobal.com</div></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="glass-panel">
                <form id="contactForm" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="label-text">Classification</label>
                            <select class="input-field" required>
                                <option value="" disabled selected>Identify Role...</option>
                                <option>Buyer / Importer</option>
                                <option>Supplier / Manufacturer</option>
                                <option>Strategic Partner</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Business Name</label>
                            <input type="text" placeholder="Legal Entity Name" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="label-text">Full Name</label>
                            <input type="text" placeholder="Representative" class="input-field" required>
                        </div>
                        <div>
                            <label class="label-text">Direct Email</label>
                            <input type="email" placeholder="corporate@domain.com" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="label-text">City of Operation</label>
                            <input type="text" placeholder="Headquarters" class="input-field" required>
                        </div>
                        <div>
                            <label class="label-text">Country</label>
                            <input type="text" placeholder="Territory" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="label-text">Primary Vertical</label>
                            <select class="input-field">
                                <option>Manufacturing</option>
                                <option>Logistics Sync</option>
                                <option>Strategic Sourcing</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Deployment Urgency</label>
                            <select class="input-field">
                                <option>Standard Action</option>
                                <option>Priority Protocol</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="label-text">Operational Parameters</label>
                        <textarea rows="2" placeholder="Describe your project requirements..." class="input-field resize-none"></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="submit-btn">
                        <span id="btnText">Execute Transmission</span> <i id="btnIcon" class="fas fa-bolt ml-3"></i>
                    </button>
                </form>
            </div>
            <div class="footer-text">Prominex Global © 2026 | Global Supply Solutions</div>
        </div>
    </div>

    <script>
        const verbs = ["Secure", "Optimize", "Scale", "Direct", "Evolve"];
        const verticals = ["Supply Chain.", "Procurement.", "Logistics.", "Fulfillment.", "Operations."];
        let i = 0;

        const verbEl = document.getElementById("verb-word");
        const vertEl = document.getElementById("vertical-word");

        setInterval(() => {
            verbEl.classList.add("word-exit");
            vertEl.classList.add("word-exit");
            setTimeout(() => {
                i = (i + 1) % verbs.length;
                verbEl.innerText = verbs[i];
                vertEl.innerText = verticals[i];
                verbEl.classList.remove("word-exit");
                vertEl.classList.add("word-enter");
                vertEl.classList.remove("word-exit");
                vertEl.classList.add("word-enter");
                setTimeout(() => {
                    verbEl.classList.remove("word-enter");
                    vertEl.classList.remove("word-enter");
                }, 20);
            }, 150);
        }, 2500);

        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('btnText').innerText = "Transmitting...";
            setTimeout(() => {
                document.getElementById('submitBtn').classList.add('btn-success');
                document.getElementById('btnText').innerText = "Protocol Secure";
                setTimeout(() => location.reload(), 3000);
            }, 1800);
        });
    </script>
</body>
</html>
