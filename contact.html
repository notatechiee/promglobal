<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Prominex Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        html, body { 
            height: 100vh; width: 100vw; margin: 0; padding: 0;
            overflow: hidden; background-color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; align-items: center; justify-content: center;
        }

        .bg-overlay {
            position: fixed; inset: 0;
            background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&q=80');
            background-size: cover; background-position: center;
            filter: grayscale(1) brightness(1.1) opacity(0.06);
            z-index: -1;
        }

        .nav-back {
            position: absolute; top: 30px; left: 40px;
            color: #1e293b; font-size: 10px; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 0.5em;
            text-decoration: none; border-bottom: 2px solid rgba(30, 41, 59, 0.1);
            z-index: 1000; transition: all 0.4s ease;
        }

        /* --- HEADING: TRIPLE STACK --- */
        .main-heading { display: flex; flex-direction: column; line-height: 0.9; margin-bottom: 2rem; }
        .line-stack { display: flex; align-items: center; white-space: nowrap; }
        .line-your { padding-left: 80px; color: #cbd5e1; font-weight: 300; margin: 5px 0; }

        .word-wrapper {
            display: inline-flex; height: 1.1em; overflow: hidden;
            vertical-align: bottom; position: relative; min-width: 240px;
        }

        .dynamic-text {
            display: block; position: absolute; left: 0; width: 100%;
            transition: all 0.15s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .word-exit { transform: translateY(-100%); opacity: 0; }
        .word-enter { transform: translateY(100%); opacity: 0; }

        /* --- CONTACT INFO SIDEBAR --- */
        .contact-sidebar {
            border-left: 3px solid #3b82f6;
            padding-left: 20px;
            margin-top: 2rem;
        }
        .info-item { margin-bottom: 1.5rem; }
        .info-label { font-size: 9px; font-weight: 900; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 4px; }
        .info-value { font-size: 13px; font-weight: 700; color: #1e293b; line-height: 1.4; max-width: 250px; }

        /* --- COMPACT GLASS PANEL --- */
        .glass-panel {
            background: rgba(15, 23, 42, 0.96); 
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 8px; padding: 10px 14px; width: 100%; color: #ffffff; font-size: 12px;
            transition: border-color 0.3s;
        }
        .input-field:focus { border-color: #3b82f6; outline: none; }
        .label-text { font-size: 8px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 5px; display: block; }

        .submit-btn {
            background: #3b82f6; color: white; padding: 16px; border-radius: 8px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 0.3em; font-size: 10px; width: 100%; cursor: pointer;
        }

        .footer-text { color: #94a3b8; font-size: 9px; font-weight: 700; text-transform: uppercase; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <a href="index.html?menu=open" class="nav-back">← BACK TO HUB</a>

    <div class="max-w-[1200px] w-full grid grid-cols-1 lg:grid-cols-2 gap-12 px-10 items-center">
        
        <div>
            <h1 class="main-heading text-5xl md:text-6xl font-black uppercase text-slate-900 tracking-tighter">
                <span class="line-stack">Let's <span class="word-wrapper text-blue-600 ml-4"><span id="verb-word" class="dynamic-text">Secure</span></span></span>
                <span class="line-stack line-your">Your</span>
                <span class="line-stack"><span class="word-wrapper"><span id="vertical-word" class="dynamic-text">Supply Chain.</span></span></span>
            </h1>

            <div class="contact-sidebar">
                <div class="info-item">
                    <div class="info-label">Global Command</div>
                    <div class="info-value">Plot 778-780, Killa-Pardi,<br>Valsad, Gujarat, India</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Communications</div>
                    <div class="info-value">info@prominexglobal.com</div>
                </div>
            </div>
        </div>

        <div>
            <div class="glass-panel">
                <form id="contactForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">Classification</label>
                            <select class="input-field" required>
                                <option value="" disabled selected>Role</option>
                                <option>Buyer / Importer</option>
                                <option>Supplier / Manufacturer</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Company</label>
                            <input type="text" placeholder="Entity Name" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">Contact Name</label>
                            <input type="text" placeholder="Full Name" class="input-field" required>
                        </div>
                        <div>
                            <label class="label-text">Email</label>
                            <input type="email" placeholder="work@email.com" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">City</label>
                            <input type="text" placeholder="Location" class="input-field" required>
                        </div>
                        <div>
                            <label class="label-text">Country</label>
                            <input type="text" placeholder="Nation" class="input-field" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-text">Vertical</label>
                            <select class="input-field">
                                <option>Manufacturing</option>
                                <option>Sourcing</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Priority</label>
                            <select class="input-field">
                                <option>Standard</option>
                                <option>Priority</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="label-text">Brief</label>
                        <textarea rows="2" placeholder="Describe requirements..." class="input-field resize-none"></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="submit-btn">
                        Execute Transmission <i class="fas fa-bolt ml-2"></i>
                    </button>
                </form>
            </div>
            <div class="footer-text">Prominex Global © 2026</div>
        </div>
    </div>

    <script>
        const verbs = ["Secure", "Optimize", "Scale", "Direct", "Evolve"];
        const verticals = ["Supply Chain.", "Procurement.", "Logistics.", "Fulfillment.", "Operations."];
        let i = 0;
        const verbEl = document.getElementById("verb-word");
        const vertEl = document.getElementById("vertical-word");

        setInterval(() => {
            verbEl.classList.add("word-exit");
            vertEl.classList.add("word-exit");
            setTimeout(() => {
                i = (i + 1) % verbs.length;
                verbEl.innerText = verbs[i];
                vertEl.innerText = verticals[i];
                verbEl.classList.remove("word-exit");
                vertEl.classList.add("word-enter");
                vertEl.classList.remove("word-exit");
                vertEl.classList.add("word-enter");
                setTimeout(() => {
                    verbEl.classList.remove("word-enter");
                    vertEl.classList.remove("word-enter");
                }, 20);
            }, 150);
        }, 2200);
    </script>
</body>
</html>
