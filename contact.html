<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="canonical" href="https://www.prominexglobal.com/contact" />
    
    <title>Contact | Prominex Global</title>
    <meta name="description" content="Contact Prominex Global for supply chain solutions, logistics, and industrial consultancy.">
    <link rel="canonical" href="https://prominexglobal.com/contact">
    <link rel="icon" type="image/png" href="assets/favicon-new.PNG">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        html, body { 
            height: 100vh; width: 100vw; margin: 0; padding: 0;
            overflow: hidden; background-color: #ffffff; 
            font-family: 'Inter', sans-serif; 
        }

        /* UPDATED BACKGROUND LAYER */
        .bg-overlay {
            position: fixed; inset: 0;
            background-image: url();
            background-size: cover; background-position: center;
            /* Bumped opacity to 0.07 for subtle visibility */
            filter: grayscale(1) brightness(0.05) opacity(0.01);
            z-index: -1;
        }

        .nav-back {
            position: absolute; top: 40px; left: 60px;
            color: #ffffff; background: #0f172a;
            padding: 12px 24px; border-radius: 50px;
            font-size: 10px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.3em; text-decoration: none;
            z-index: 1000; transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; align-items: center; gap: 10px;
        }
        .nav-back:hover { background: #3b82f6; transform: translateX(10px); }

        .branding-section {
            flex: 0 0 45%;
            display: flex; flex-direction: column; justify-content: center;
        }

        .main-heading { line-height: 0.9; width: 100%; }
        .line-stack { display: flex; align-items: center; white-space: nowrap; width: 100%; }
        
        .line-your { 
            color: #EB0000; 
            font-weight: 300; 
            font-size: 0.7em; 
            letter-spacing: 0.4em; 
            text-align: center; 
            margin: 8px 0;
            width: 100%;
            display: block; 
        }

        .word-wrapper {
            display: inline-flex; height: 1.1em; overflow: hidden;
            vertical-align: bottom; position: relative; 
            flex-grow: 1;
        }

        .dynamic-text {
            display: block; position: absolute; left: 0; width: 100%;
            transition: all 0.2s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .word-exit { transform: translateY(-100%); opacity: 0; }
        .word-enter { transform: translateY(100%); opacity: 0; }

        .contact-sidebar { border-left: 4px solid #3b82f6; padding-left: 20px; margin-top: 2rem; }
        .info-label { font-size: 10px; font-weight: 900; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.2em; }
        .info-value { font-size: 14px; font-weight: 800; color: #1e293b; line-height: 1.4; margin-bottom: 1rem; }

        .form-container { 
            flex: 0 0 50%;
            display: flex; flex-direction: column; justify-content: center;
        } 
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.98); 
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px; 
            padding: 2.8rem; 
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }

        .input-group { position: relative; width: 100%; }
        .input-field {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 6px; padding: 12px 14px; width: 100%; color: #ffffff; font-size: 11px;
            transition: all 0.3s; appearance: none;
        }
        .input-field:hover { border-color: rgba(255, 255, 255, 0.3); }
        .input-field:focus { border-color: #3b82f6; outline: none; background: rgba(255, 255, 255, 0.08); }
        
        select.input-field option { background: #0f172a; color: white; }
        .label-text { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #e2e8f0; margin-bottom: 5px; display: block; letter-spacing: 0.1em; }

        .submit-btn {
            background: #3b82f6; color: white; padding: 16px; border-radius: 8px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 0.3em; font-size: 10px; width: 100%; cursor: pointer; 
            border: none; margin-top: 10px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:hover { background: #2563eb; transform: translateY(-2px); }
        .submit-btn.success { background: #10b981 !important; pointer-events: none; }

        .footer-text { 
            color: #94a3b8; 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            text-align: center; 
            margin-top: 18px; 
            letter-spacing: 0.05em;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 1024px) {
            html, body { overflow-y: auto; height: auto; }
            body { padding: 20px !important; }
            .nav-back { top: 20px; left: 20px; padding: 8px 16px; font-size: 8px; }
            
            .w-full.max-w-\[1400px\] { 
                flex-direction: column !important; 
                gap: 40px !important;
                margin-top: 80px;
            }
            
            .branding-section, .form-container { flex: 0 0 100%; width: 100%; }
            .main-heading { text-align: center; font-size: 2.8rem !important; }
            .line-stack { justify-content: center; }
            
            .glass-panel { padding: 1.8rem; }
            #contactForm { grid-template-columns: 1fr !important; }
            .col-span-2 { grid-column: span 1 / span 1 !important; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-12">

    <div class="bg-overlay"></div>
    
    <a href="/" class="nav-back">
        <i class="fas fa-chevron-left"></i> BACK TO HUB
    </a>

    <div class="w-full max-w-[1400px] h-full flex flex-row items-center justify-between gap-6">
        
        <div class="branding-section">
            <h1 class="main-heading text-5xl lg:text-7xl font-black uppercase text-slate-900 tracking-tighter">
                <span class="line-stack">Let's <span class="word-wrapper text-blue-600 ml-4"><span id="verb-word" class="dynamic-text">Secure</span></span></span>
                <span class="line-stack line-your">Your</span>
                <span class="line-stack"><span class="word-wrapper"><span id="vertical-word" class="dynamic-text">Supply Chain.</span></span></span>
            </h1>

            <div class="contact-sidebar">
                <div>
                    <div class="info-label">Headquarters</div>
                    <div class="info-value">780, Killa-Pardi,<br>Valsad, Gujarat, India - 396125</div>
                </div>
                <div>
                    <div class="info-label">Contact Us</div>
                    <div class="info-value">info@prominexglobal.com</div>
                </div>
            </div>
        </div>

        <div class="form-container">
            <div class="glass-panel">
                <form id="contactForm" action="https://api.staticforms.dev/submit" method="POST" class="grid grid-cols-2 gap-x-6 gap-y-4">
                    <input type="hidden" name="apiKey" value="sf_929a07dd0148cafdd2c3ca89" />
                    <div class="input-group">
                        <label class="label-text">Classification</label>
                        <select name="$role" class="input-field" required>
                            <option value="" disabled selected>Select Role</option>
                            <option>Buyer / Importer</option>
                            <option>Supplier / Manufacturer</option>
                            <option>Exporter</option>
                            <option>Others</option>
                        </select>
                    </div>
                
                    <div class="input-group">
                        <label class="label-text">Business Entity</label>
                        <input type="text" name="company" placeholder="Legal Name" class="input-field" required>
                    </div>
                
                    <div class="input-group">
                        <label class="label-text">Representative</label>
                        <input type="text" name="name" placeholder="Full Name" class="input-field" required>
                    </div>
                
                    <div class="input-group">
                        <label class="label-text">Direct Email</label>
                        <input type="email" name="email" placeholder="corporate@domain.com" class="input-field" required>
                    </div>
                
                    <div class="input-group">
                        <label class="label-text">City</label>
                        <input type="text" name="city" placeholder="Location" class="input-field" required>
                    </div>
                
                    <div class="input-group">
                        <label class="label-text">Country</label>
                        <input type="text" name="country" placeholder="Nation" class="input-field" required>
                    </div>
                
                    <div class="input-group">
                        <label class="label-text">Vertical</label>
                        <select name="vertical" class="input-field">
                            <option>Track & Trace</option>
                            <option>Billing</option>
                            <option>Manufacturing & White Labeling</option>
                            <option>Sourcing & Procurement</option>
                            <option>Logistics, Freight & Customs</option>
                            <option>Others</option>
                        </select>
                    </div>
                
                    <div class="input-group">
                        <label class="label-text">Priority Status</label>
                        <select name="priority" class="input-field">
                            <option>Standard (24 Hrs)</option>
                            <option>Priority (12 Hrs)</option>
                        </select>
                    </div>
                
                    <div class="col-span-2">
                        <label class="label-text">How Can We Support You</label>
                        <textarea name="message" rows="1" placeholder="Define project parameters..." class="input-field resize-none"></textarea>
                    </div>
                
                    <div class="col-span-2">
                        <button type="submit" id="submitBtn" class="submit-btn">
                            <span id="btnText">SEND</span>
                        </button>
                    </div>
                </form>
            </div>
            <div class="footer-text">Prominex Global © 2026 | SUPPLY CHAIN REIMAGINED</div>
        </div>
    </div>

    <script>
        const contactForm = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
    
        contactForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            btnText.innerText = "TRANSMITTING...";
            submitBtn.style.opacity = "0.7";
            submitBtn.style.pointerEvents = "none";
    
            // Convert form data to JSON for StaticForms
            const formData = new FormData(contactForm);
            const data = {};
            formData.forEach((value, key) => { data[key] = value });
    
            try {
                const response = await fetch('https://api.staticforms.xyz/submit', {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'application/json' }
                });
    
                const result = await response.json();
    
                if (result.success) {
                    submitBtn.classList.add('success');
                    submitBtn.style.opacity = "1";
                    btnText.innerHTML = '<i class="fas fa-check"></i> TRANSMITTED';
                    contactForm.reset();
                } else {
                    btnText.innerText = "API ERROR";
                    submitBtn.style.background = "#ef4444";
                }
            } catch (error) {
                btnText.innerText = "CONNECTION FAILED";
                submitBtn.style.background = "#ef4444";
            }
    
            setTimeout(() => {
                submitBtn.classList.remove('success');
                submitBtn.style.background = "#3b82f6";
                btnText.innerText = "SEND";
                submitBtn.style.pointerEvents = "auto";
                submitBtn.style.opacity = "1";
            }, 4000);
        });

        const verbs = ["Engineer", "Refine", "Leverage", "Scale", "Optimize"];
        const verticals = ["Supply Chain.", "Procurement.", "Logistics.", "Fulfillment.", "Operations."];
        let i = 0;
        const verbEl = document.getElementById("verb-word");
        const vertEl = document.getElementById("vertical-word");

        setInterval(() => {
            verbEl.classList.add("word-exit");
            vertEl.classList.add("word-exit");
            setTimeout(() => {
                i = (i + 1) % verbs.length;
                verbEl.innerText = verbs[i];
                vertEl.innerText = verticals[i];
                verbEl.classList.remove("word-exit");
                verbEl.classList.add("word-enter");
                vertEl.classList.remove("word-exit");
                vertEl.classList.add("word-enter");
                setTimeout(() => {
                    verbEl.classList.remove("word-enter");
                    vertEl.classList.remove("word-enter");
                }, 20);
            }, 150);
        }, 2200);
    </script>
</body>
</html>
